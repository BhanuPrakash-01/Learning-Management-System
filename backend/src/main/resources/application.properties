spring.application.name=demo
spring.config.import=optional:file:.env[.properties]

# Server
server.port=${SERVER_PORT:8000}

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sms}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:60000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:240000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_MS:30000}
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# Logging
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Security
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
security.require-https=${SECURE_ONLY:false}

jwt.secret=${JWT_SECRET:}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Mail
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.mail.from=${MAIL_FROM:no-reply@anurag.ac.in}
frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# Judge0
judge0.api.url=${JUDGE0_API_URL:}
judge0.api.key=${JUDGE0_API_KEY:}
judge0.api.host=${JUDGE0_API_HOST:}
